<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Лингво Тренажёр · Полиглот 3.0</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body {
            background: linear-gradient(145deg, #1a2a1f 0%, #0f1a0e 100%);
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2, h3 {
            color: #e0d5c1;
            text-shadow: 2px 2px 0 #1e3b1a;
            margin-bottom: 16px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 8px;
            text-align: center;
        }

        /* Панель управления */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 15px;
            color: #e0d5c1;
        }
        .lang-selector, .ui-lang-selector {
            padding: 8px 12px;
            border-radius: 20px;
            background: #1e3b1a;
            color: #e0d5c1;
            border: 1px solid #d4af37;
            font-weight: bold;
        }
        .settings-btn {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            font-size: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
        }
        .settings-panel {
            display: none;
            background: #1e3b1a;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
            border: 1px solid #d4af37;
            color: #e0d5c1;
        }
        .settings-panel label {
            display: block;
            margin-bottom: 8px;
        }

        /* Вкладки */
        .tabs-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #1e3b1a80;
            padding: 8px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            border: 1px solid #d4af37;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #b59a6b;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #d4af37;
            color: #1e3b1a;
            box-shadow: 0 4px 0 #7a5c1a;
        }

        /* Поиск */
        .search-panel {
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }
        .search-panel input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 40px;
            border: none;
            background: #fcf9f0;
            color: #1e3b1a;
            font-weight: bold;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Панель добавления */
        .add-panel {
            background: #1e3b1a80;
            backdrop-filter: blur(4px);
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #d4af37;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-width: 600px;
        }
        .add-panel input {
            flex: 2 1 200px;
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 40px;
            border: none;
            background: #fcf9f0;
            color: #1e3b1a;
            font-weight: bold;
        }
        .add-panel button {
            flex: 0 0 auto;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            background: #d4af37;
            color: #1e3b1a;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #7a5c1a;
        }
        .add-panel button:disabled { opacity: 0.6; }

        /* Карточки */
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            max-width: 1000px;
        }
        .card {
            background: #fcf9f0;
            border: 3px solid #d4af37;
            border-radius: 20px;
            padding: 16px 8px 10px 8px;
            width: 200px;
            min-width: 180px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 6px 0 #1e3b1a, 0 4px 10px rgba(0,0,0,0.4);
            transition: 0.1s ease;
            position: relative;
            touch-action: manipulation;
        }
        .card:active { transform: translateY(3px); box-shadow: 0 3px 0 #1e3b1a; }
        .card-text {
            font-size: 22px;
            font-weight: bold;
            color: #1e3b1a;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            word-break: break-word;
            line-height: 1.3;
            padding: 0 4px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            border-top: 1px dashed #b59a6b;
            padding-top: 10px;
        }
        .controls button {
            background: #2e4a2a;
            border: none;
            color: white;
            font-size: 20px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 0 #142310;
            border: 1px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: transparent;
            border: none;
            color: #a00;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.6;
            z-index: 5;
        }
        .delete-btn:active { opacity: 1; }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fcf9f0;
            padding: 20px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            border: 3px solid #d4af37;
            color: #1e3b1a;
        }
        .modal-content button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #2e4a2a;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .backup-panel { margin-top: 30px; display: flex; gap: 10px; }
        .backup-btn {
            background: transparent;
            border: 1px solid #b59a6b;
            color: #b59a6b;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        #import-file-input { display: none; }
        .footer { margin-top: 20px; color: #b59a6b; text-align: center; }
        .empty-message {
            color: #e0d5c1;
            padding: 40px;
            text-align: center;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h2>🌍 ЛингвоТренажёр 3.0</h2>

    <!-- Верхняя панель -->
    <div class="toolbar">
        <div style="display: flex; align-items: center; gap: 8px;">
            <span id="lang-flag">🇹🇿</span>
            <select id="lang-select" class="lang-selector">
                <option value="sw" selected>Суахили</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
                <option value="it">Italiano</option>
                <option value="pt">Português</option>
                <option value="nl">Nederlands</option>
                <option value="ar">العربية</option>
                <option value="zh-CN">中文</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="hi">हिन्दी</option>
                <option value="tr">Türkçe</option>
            </select>
        </div>
        <button class="settings-btn" id="settings-toggle">⚙️</button>
    </div>

    <!-- Панель настроек -->
    <div class="settings-panel" id="settings-panel">
        <label>🌐 Мой родной язык:</label>
        <select id="ui-lang-select" class="ui-lang-selector">
            <option value="ru" selected>Русский</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
        </select>
        <p style="font-size: 14px; margin-top: 10px;">⚡ Влияет на язык подсказок и направление перевода.</p>
    </div>

    <!-- Вкладки -->
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="words">📝 Слова</button>
        <button class="tab-btn" data-tab="phrases">💬 Фразы</button>
    </div>

    <!-- Поиск -->
    <div class="search-panel">
        <input type="text" id="search-input" placeholder="🔍 Поиск...">
    </div>

    <!-- Панель добавления -->
    <div class="add-panel">
        <input type="text" id="new-item-input" placeholder="Введи слово или фразу...">
        <button id="add-item-btn">➕ Добавить</button>
    </div>

    <!-- Карточки -->
    <div id="app" class="cards-container"></div>

    <!-- Бэкап -->
    <div class="backup-panel">
        <button class="backup-btn" id="export-btn">📤 Экспорт</button>
        <button class="backup-btn" id="import-btn">📥 Импорт</button>
    </div>
    <input type="file" id="import-file-input" accept=".json">

    <div class="footer">🧠 Активный recall · 🎤 Ручная запись · ⚙️ Настройки</div>

    <!-- Модальное окно X-Ray -->
    <div class="modal" id="xray-modal">
        <div class="modal-content">
            <h3>🧠 Разбор</h3>
            <p id="xray-text">Здесь будет детальный разбор.</p>
            <button id="close-modal">Понятно</button>
        </div>
    </div>

    <script>
        // ================== ГЛОБАЛЬНЫЕ НАСТРОЙКИ ==================
        let currentLang = 'sw';           // Изучаемый язык
        let uiLang = 'ru';                // Родной язык (интерфейс)
        let currentTab = 'words';
        let words = [];
        let phrases = [];

        // Флаги и названия
        const flags = { sw: '🇹🇿', en: '🇬🇧', fr: '🇫🇷', de: '🇩🇪', es: '🇪🇸', it: '🇮🇹', pt: '🇵🇹', nl: '🇳🇱', ar: '🇸🇦', 'zh-CN': '🇨🇳', ja: '🇯🇵', ko: '🇰🇷', hi: '🇮🇳', tr: '🇹🇷' };
        const langNames = { sw: 'суахили', en: 'английском', fr: 'французском', de: 'немецком', es: 'испанском', it: 'итальянском', pt: 'португальском', nl: 'голландском', ar: 'арабском', 'zh-CN': 'китайском', ja: 'японском', ko: 'корейском', hi: 'хинди', tr: 'турецком' };
        const langNamesFull = { sw: 'суахили', en: 'английский', fr: 'французский', de: 'немецкий', es: 'испанский', it: 'итальянский', pt: 'португальский', nl: 'голландский', ar: 'арабский', 'zh-CN': 'китайский', ja: 'японский', ko: 'корейский', hi: 'хинди', tr: 'турецкий' };

        // Плейсхолдеры для поля ввода
        const placeholders = {
            ru: { sw: 'Введи слово или фразу на суахили...', en: 'Введи слово или фразу на английском...', fr: 'Введи слово или фразу на французском...', de: 'Введи слово или фразу на немецком...', es: 'Введи слово или фразу на испанском...' },
            en: { sw: 'Enter a word or phrase in Swahili...', en: 'Enter a word or phrase in English...', fr: 'Enter a word or phrase in French...' },
            de: { sw: 'Gib ein Wort oder einen Satz auf Swahili ein...', en: 'Gib ein Wort oder einen Satz auf Englisch ein...' }
        };

        // ================== ХРАНЕНИЕ ==================
        function getStorageKey(base) {
            return `lingvo_${currentLang}_${base}`;
        }

        function loadWords() {
            const stored = localStorage.getItem(getStorageKey('words'));
            if (stored) { try { return JSON.parse(stored); } catch(e) {} }
            return [];
        }

        function loadPhrases() {
            const stored = localStorage.getItem(getStorageKey('phrases'));
            if (stored) { try { return JSON.parse(stored); } catch(e) {} }
            return [];
        }

        function saveWords() {
            localStorage.setItem(getStorageKey('words'), JSON.stringify(words));
        }

        function savePhrases() {
            localStorage.setItem(getStorageKey('phrases'), JSON.stringify(phrases));
        }

        // ================== АВАРИЙНЫЙ БЭКАП ==================
        window.addEventListener('beforeunload', () => {
            const emergency = { lang: currentLang, words, phrases, timestamp: new Date().toISOString() };
            localStorage.setItem('lingvo_emergency_backup', JSON.stringify(emergency));
        });

        function tryEmergencyRestore() {
            if (words.length === 0 && phrases.length === 0) {
                const emergency = localStorage.getItem('lingvo_emergency_backup');
                if (emergency) {
                    try {
                        const backup = JSON.parse(emergency);
                        if (backup.lang === currentLang) {
                            words = backup.words || [];
                            phrases = backup.phrases || [];
                            saveWords();
                            savePhrases();
                        }
                    } catch(e) {}
                }
            }
        }

        // ================== АУДИО РЕКОРДЕР (РУЧНОЙ) ==================
        let mediaRecorder;
        let audioChunks = [];
        let currentRecBtn = null;
        let isRecording = false;

        async function toggleRecording(btn, word) {
            if (!isRecording) {
                // Начать запись
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                        new Audio(URL.createObjectURL(blob)).play();
                        stream.getTracks().forEach(t => t.stop());
                        btn.textContent = '🎤';
                        btn.style.background = '#8b4513';
                        isRecording = false;
                        currentRecBtn = null;
                    };
                    mediaRecorder.start();
                    btn.textContent = '🔴';
                    btn.style.background = '#8b0000';
                    isRecording = true;
                    currentRecBtn = btn;
                } catch (err) {
                    alert('❌ Нет доступа к микрофону.');
                }
            } else {
                // Остановить запись
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }
        }

        // ================== ИНТЕРФЕЙС ==================
        const app = document.getElementById('app');
        const searchInput = document.getElementById('search-input');
        const newItemInput = document.getElementById('new-item-input');
        const addItemBtn = document.getElementById('add-item-btn');
        const langSelect = document.getElementById('lang-select');
        const langFlag = document.getElementById('lang-flag');
        const uiLangSelect = document.getElementById('ui-lang-select');
        const settingsToggle = document.getElementById('settings-toggle');
        const settingsPanel = document.getElementById('settings-panel');
        const modal = document.getElementById('xray-modal');
        const xrayText = document.getElementById('xray-text');

        // Переключение панели настроек
        settingsToggle.addEventListener('click', () => {
            settingsPanel.style.display = settingsPanel.style.display === 'none' ? 'block' : 'none';
        });

        // Смена родного языка
        uiLangSelect.addEventListener('change', (e) => {
            uiLang = e.target.value;
            updatePlaceholder();
        });

        function updatePlaceholder() {
            const langName = langNames[currentLang] || currentLang;
            const placeholdersMap = placeholders[uiLang] || placeholders.ru;
            newItemInput.placeholder = placeholdersMap[currentLang] || `Введи слово или фразу на ${langName}...`;
        }

        // Переключение изучаемого языка
        function switchLanguage(lang) {
            currentLang = lang;
            langFlag.textContent = flags[lang] || '🌐';
            updatePlaceholder();
            words = loadWords();
            phrases = loadPhrases();
            tryEmergencyRestore();
            renderCards();
        }

        langSelect.addEventListener('change', (e) => {
            switchLanguage(e.target.value);
        });

        // Вкладки
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                renderCards();
            });
        });

        // Удаление карточки
        function deleteItem(index) {
            if (currentTab === 'words') {
                words.splice(index, 1);
                saveWords();
            } else {
                phrases.splice(index, 1);
                savePhrases();
            }
            renderCards();
        }

        // Рендер карточек
        function renderCards() {
            const searchTerm = searchInput.value.trim().toLowerCase();
            let items = currentTab === 'words' ? [...words] : [...phrases];

            if (searchTerm) {
                items = items.filter(item =>
                    item.sw.toLowerCase().includes(searchTerm) ||
                    item.ru.toLowerCase().includes(searchTerm)
                );
            }

            app.innerHTML = '';

            if (items.length === 0) {
                const msg = currentTab === 'words' ? 'слов' : 'фраз';
                app.innerHTML = `<div class="empty-message">✨ Пока нет ${msg}. Добавьте первое!</div>`;
                return;
            }

            // Находим оригинальные индексы для удаления
            const originalItems = currentTab === 'words' ? words : phrases;

            items.forEach((item) => {
                const originalIndex = originalItems.findIndex(orig => orig.sw === item.sw && orig.ru === item.ru);
                
                const card = document.createElement('div');
                card.className = 'card';

                // Крестик удаления
                const delBtn = document.createElement('button');
                delBtn.textContent = '✖';
                delBtn.className = 'delete-btn';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (confirm(`Удалить "${item.ru}"?`)) {
                        deleteItem(originalIndex);
                    }
                };
                card.appendChild(delBtn);

                const textDiv = document.createElement('div');
                textDiv.className = 'card-text';
                textDiv.textContent = item.ru;
                let flipped = true;

                const controls = document.createElement('div');
                controls.className = 'controls';

                // Озвучка
                const playBtn = document.createElement('button');
                playBtn.textContent = '🔊';
                playBtn.onclick = (e) => {
                    e.stopPropagation();
                    const utterance = new SpeechSynthesisUtterance(item.sw);
                    utterance.lang = currentLang;
                    utterance.rate = 0.9;
                    speechSynthesis.speak(utterance);
                };

                // X-Ray
                const tipBtn = document.createElement('button');
                tipBtn.textContent = '🧠';
                tipBtn.style.background = '#4a6b45';
                tipBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (currentTab === 'phrases') {
                        xrayText.innerText = `📐 Дословный разбор фразы:\n\n"${item.sw}"\n\n(Детальный разбор появится позже)`;
                    } else {
                        xrayText.innerText = `📖 Слово: "${item.sw}"\n\nПеревод: ${item.ru}\n\nГрамматическая справка будет здесь.`;
                    }
                    modal.style.display = 'flex';
                };

                // Запись (ручная)
                const recBtn = document.createElement('button');
                recBtn.textContent = '🎤';
                recBtn.style.background = '#8b4513';
                recBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleRecording(recBtn, item.sw);
                };

                controls.appendChild(playBtn);
                controls.appendChild(tipBtn);
                controls.appendChild(recBtn);

                card.appendChild(textDiv);
                card.appendChild(controls);

                card.onclick = (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    flipped = !flipped;
                    textDiv.textContent = flipped ? item.ru : item.sw;
                };

                app.appendChild(card);
            });
        }

        // Закрытие модалки
        document.getElementById('close-modal').addEventListener('click', () => modal.style.display = 'none');
        window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

        // Поиск
        searchInput.addEventListener('input', renderCards);

        // ================== ДОБАВЛЕНИЕ ==================
        async function addNewItem() {
            const ruText = newItemInput.value.trim();
            if (!ruText) return;

            addItemBtn.disabled = true;
            addItemBtn.textContent = '⏳ Перевод...';

            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${uiLang}&tl=${currentLang}&dt=t&dt=md&q=${encodeURIComponent(ruText)}`;
                const res = await fetch(url);
                const data = await res.json();
                
                const alternatives = [];
                if (data[0] && data[0].length) {
                    for (let i = 0; i < data[0].length; i++) {
                        const swText = data[0][i][0];
                        if (swText && !alternatives.includes(swText)) {
                            alternatives.push(swText);
                        }
                    }
                }
                
                if (data[1] && data[1].length) {
                    for (let i = 0; i < data[1].length; i++) {
                        if (data[1][i][1]) {
                            for (let j = 0; j < data[1][i][1].length; j++) {
                                const swText = data[1][i][1][j];
                                if (swText && !alternatives.includes(swText)) {
                                    alternatives.push(swText);
                                }
                            }
                        }
                    }
                }

                if (alternatives.length === 0) {
                    alert('❌ Не удалось перевести.');
                    return;
                }

                let chosenSw = alternatives[0];
                if (alternatives.length > 1) {
                    let message = `"${ruText}"\n\nВыберите перевод:\n`;
                    alternatives.forEach((alt, i) => { message += `\n${i+1}. ${alt}`; });
                    const choice = prompt(message, '1');
                    if (choice !== null) {
                        const num = parseInt(choice, 10);
                        if (!isNaN(num) && num >= 1 && num <= alternatives.length) {
                            chosenSw = alternatives[num-1];
                        }
                    } else {
                        return; // Отмена
                    }
                }

                const newItem = { sw: chosenSw, ru: ruText };
                
                // Определяем слово или фраза
                const wordCount = ruText.split(/\s+/).length;
                let isPhrase = ruText.includes(' ') && wordCount >= 3;
                
                if (ruText.includes(' ') && wordCount === 2) {
                    isPhrase = confirm(`"${ruText}" → "${chosenSw}"\n\nЭто ФРАЗА?\n(ОК = фраза, Отмена = слово)`);
                }

                if (isPhrase) {
                    phrases.push(newItem);
                    savePhrases();
                    if (currentTab !== 'phrases') {
                        document.querySelector('[data-tab="phrases"]').click();
                    }
                } else {
                    words.push(newItem);
                    saveWords();
                    if (currentTab !== 'words') {
                        document.querySelector('[data-tab="words"]').click();
                    }
                }

                newItemInput.value = '';
                renderCards();
            } catch (e) {
                alert('❌ Ошибка сети.');
            } finally {
                addItemBtn.disabled = false;
                addItemBtn.textContent = '➕ Добавить';
            }
        }

        addItemBtn.addEventListener('click', addNewItem);
        newItemInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addNewItem(); });

        // ================== ЭКСПОРТ / ИМПОРТ ==================
        document.getElementById('export-btn').addEventListener('click', async () => {
            const data = { lang: currentLang, words, phrases };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const fileName = `lingvo_${currentLang}_${new Date().toISOString().slice(0,10)}.json`;
            
            if (navigator.share && navigator.canShare) {
                const file = new File([blob], fileName, { type: 'application/json' });
                if (navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({ title: 'Экспорт', files: [file] });
                        return;
                    } catch(e) {}
                }
            }
            
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(a.href);
        });

        document.getElementById('import-btn').addEventListener('click', () => {
            document.getElementById('import-file-input').click();
        });

        document.getElementById('import-file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (imported.lang && imported.lang !== currentLang) {
                        const fileNameLang = langNamesFull[imported.lang] || imported.lang;
                        const currentLangName = langNamesFull[currentLang] || currentLang;
                        if (!confirm(`⚠️ Файл для "${fileNameLang}", а выбран "${currentLangName}". Импортировать?`)) {
                            return;
                        }
                    }
                    if (imported.words) { words = imported.words; saveWords(); }
                    if (imported.phrases) { phrases = imported.phrases; savePhrases(); }
                    renderCards();
                    alert('✅ Импорт завершён!');
                } catch (err) {
                    alert('❌ Ошибка чтения файла.');
                }
                e.target.value = '';
            };
            reader.readAsText(file);
        });

        // ================== СТАРТ ==================
        switchLanguage('sw');
        updatePlaceholder();
    </script>
</body>
</html>
