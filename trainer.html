<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Лингво Тренажёр · Полиглот 3.0</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body {
            background: linear-gradient(145deg, #1a2a1f 0%, #0f1a0e 100%);
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2, h3 {
            color: #e0d5c1;
            text-shadow: 2px 2px 0 #1e3b1a;
            margin-bottom: 16px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 8px;
            text-align: center;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 15px;
            color: #e0d5c1;
        }
        .lang-selector, .ui-lang-selector {
            padding: 8px 12px;
            border-radius: 20px;
            background: #1e3b1a;
            color: #e0d5c1;
            border: 1px solid #d4af37;
            font-weight: bold;
        }
        .settings-btn {
            background: transparent;
            border: 1px solid #d4af37;
            color: #d4af37;
            font-size: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
        }
        .settings-panel {
            display: none;
            background: #1e3b1a;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
            border: 1px solid #d4af37;
            color: #e0d5c1;
        }
        .settings-panel label { display: block; margin-bottom: 8px; }
        .tabs-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #1e3b1a80;
            padding: 8px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            border: 1px solid #d4af37;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #b59a6b;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active { background: #d4af37; color: #1e3b1a; box-shadow: 0 4px 0 #7a5c1a; }
        .search-panel { width: 100%; max-width: 600px; margin-bottom: 20px; }
        .search-panel input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 40px;
            border: none;
            background: #fcf9f0;
            color: #1e3b1a;
            font-weight: bold;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }
        .add-panel {
            background: #1e3b1a80;
            backdrop-filter: blur(4px);
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #d4af37;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-width: 600px;
        }
        .add-panel input {
            flex: 2 1 200px;
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 40px;
            border: none;
            background: #fcf9f0;
            color: #1e3b1a;
            font-weight: bold;
        }
        .add-panel button {
            flex: 0 0 auto;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            background: #d4af37;
            color: #1e3b1a;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #7a5c1a;
        }
        .add-panel button:disabled { opacity: 0.6; }
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            max-width: 1000px;
        }
        .card {
            background: #fcf9f0;
            border: 3px solid #d4af37;
            border-radius: 20px;
            padding: 16px 8px 10px 8px;
            width: 200px;
            min-width: 180px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 6px 0 #1e3b1a, 0 4px 10px rgba(0,0,0,0.4);
            transition: 0.1s ease;
            position: relative;
            touch-action: manipulation;
        }
        .card:active { transform: translateY(3px); box-shadow: 0 3px 0 #1e3b1a; }
        .card-text {
            font-size: 22px;
            font-weight: bold;
            color: #1e3b1a;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            word-break: break-word;
            line-height: 1.3;
            padding: 0 4px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            border-top: 1px dashed #b59a6b;
            padding-top: 10px;
        }
        .controls button {
            background: #2e4a2a;
            border: none;
            color: white;
            font-size: 20px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 0 #142310;
            border: 1px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .delete-btn {
            position: absolute; top: 5px; right: 5px;
            background: transparent; border: none; color: #a00;
            font-size: 20px; cursor: pointer; opacity: 0.6; z-index: 5;
        }
        .delete-btn:active { opacity: 1; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: #fcf9f0; padding: 20px; border-radius: 20px;
            max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
            border: 3px solid #d4af37; color: #1e3b1a;
        }
        .modal-content table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        .modal-content td, .modal-content th { padding: 8px; border-bottom: 1px solid #b59a6b; text-align: left; }
        .modal-content .known-word { color: #d4af37; font-weight: bold; }
        .modal-content .add-to-dict {
            background: #2e4a2a; color: white; border: none;
            padding: 4px 8px; border-radius: 12px; cursor: pointer; font-size: 14px; margin-left: 8px;
        }
        .modal-content button {
            margin-top: 20px; padding: 10px 20px; background: #2e4a2a;
            color: white; border: none; border-radius: 20px; cursor: pointer;
        }
        .backup-panel { margin-top: 30px; display: flex; gap: 10px; }
        .backup-btn {
            background: transparent; border: 1px solid #b59a6b; color: #b59a6b;
            padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer;
        }
        #import-file-input { display: none; }
        .footer { margin-top: 20px; color: #b59a6b; text-align: center; }
        .empty-message { color: #e0d5c1; padding: 40px; text-align: center; font-size: 18px; }
        #active-challenge {
            margin-top: 30px; background: #1e3b1a80; padding: 20px; border-radius: 40px;
            backdrop-filter: blur(4px); border: 2px solid #d4af37; text-align: center;
            width: 100%; max-width: 600px;
        }
        .challenge-input {
            width: 100%; padding: 14px 20px; font-size: 18px; border-radius: 40px;
            border: none; background: #fcf9f0; color: #1e3b1a; font-weight: bold;
            margin: 15px 0; text-align: center;
        }
    </style>
</head>
<body>
    <h2>🌍 ЛингвоТренажёр 3.0</h2>
    <div class="toolbar">
        <div style="display: flex; align-items: center; gap: 8px;">
            <span id="lang-flag">🇹🇿</span>
            <select id="lang-select" class="lang-selector">
                <option value="sw" selected>Суахили</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
                <option value="it">Italiano</option>
                <option value="pt">Português</option>
                <option value="nl">Nederlands</option>
            </select>
        </div>
        <button class="settings-btn" id="settings-toggle">⚙️</button>
    </div>
    <div class="settings-panel" id="settings-panel">
        <label>🌐 Мой родной язык:</label>
        <select id="ui-lang-select" class="ui-lang-selector">
            <option value="ru" selected>Русский</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
        </select>
    </div>
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="words">📝 Слова</button>
        <button class="tab-btn" data-tab="phrases">💬 Фразы</button>
    </div>
    <div class="search-panel">
        <input type="text" id="search-input" placeholder="🔍 Поиск...">
    </div>
    <div class="add-panel">
        <input type="text" id="new-item-input" placeholder="Введи слово или фразу...">
        <button id="add-item-btn">➕ Добавить</button>
    </div>
    <div id="app" class="cards-container"></div>

    <div id="active-challenge">
        <h3 style="margin-top: 0; color: #e0d5c1;">⚡ Активная тренировка</h3>
        <div id="challenge-prompt" style="font-size: 32px; font-weight: bold; color: #fcf9f0; margin: 15px 0; text-shadow: 3px 3px 0 #0a1a08;">Нажми «Случайный элемент»</div>
        <input type="text" id="challenge-input" class="challenge-input" placeholder="Введи перевод..." style="display: none;">
        <div>
            <button class="challenge-btn" id="start-challenge-btn" style="background: #d4af37; border: none; color: #1e3b1a; font-weight: bold; padding: 14px 24px; font-size: 20px; border-radius: 50px; margin: 6px; cursor: pointer; box-shadow: 0 5px 0 #7a5c1a;">🎲 Случайный</button>
            <button class="challenge-btn" id="play-challenge-btn" style="display: none; background: #2e4a2a; border: none; color: white; font-weight: bold; padding: 14px 24px; font-size: 20px; border-radius: 50px; margin: 6px; cursor: pointer; box-shadow: 0 5px 0 #142310;">🔊 Прослушать</button>
            <button class="challenge-btn" id="record-challenge-btn" style="display: none; background: #8b4513; border: none; color: white; font-weight: bold; padding: 14px 24px; font-size: 20px; border-radius: 50px; margin: 6px; cursor: pointer; box-shadow: 0 5px 0 #5a2d0c;">🎤 Записать себя</button>
            <button class="challenge-btn" id="check-answer-btn" style="display: none; background: #1e3b1a; border: none; color: white; font-weight: bold; padding: 14px 24px; font-size: 20px; border-radius: 50px; margin: 6px; cursor: pointer; box-shadow: 0 5px 0 #0a1a08;">✅ Проверить</button>
        </div>
        <div id="challenge-result" style="margin-top: 20px; font-size: 24px; color: #ffe28c; min-height: 40px;"></div>
    </div>

    <div class="backup-panel">
        <button class="backup-btn" id="export-btn">📤 Экспорт</button>
        <button class="backup-btn" id="import-btn">📥 Импорт</button>
    </div>
    <input type="file" id="import-file-input" accept=".json">
    <div class="footer">🧠 Активный recall · 🎤 Ручная запись · 🔬 X-Ray разбор · ⚡ Тренировка</div>

    <div class="modal" id="xray-modal">
        <div class="modal-content" id="xray-content">
            <h3>🧠 Разбор фразы</h3>
            <div id="xray-text">Здесь будет детальный разбор.</div>
            <button id="close-modal">Понятно</button>
        </div>
    </div>

    <script>
        // ================== СЛОВАРЬ РАЗБОРА ФРАЗ ==================
        const PHRASE_BREAKDOWN = {
            'Ninatoka Urusi': { parts: [{ text: 'Ni-', meaning: 'Я', type: 'prefix' }, { text: '-na-', meaning: 'наст. время', type: 'infix' }, { text: '-toka', meaning: 'происходить', type: 'verb' }, { text: 'Urusi', meaning: 'Россия', type: 'noun' }], literal: 'Я-сейчас-происходить Россия' },
            'Ninatoka': { parts: [{ text: 'Ni-', meaning: 'Я', type: 'prefix' }, { text: '-na-', meaning: 'наст. время', type: 'infix' }, { text: '-toka', meaning: 'происходить', type: 'verb' }], literal: 'Я-сейчас-происходить' },
            'Anafanya kazi': { parts: [{ text: 'A-', meaning: 'Он/Она', type: 'prefix' }, { text: '-na-', meaning: 'наст. время', type: 'infix' }, { text: '-fanya', meaning: 'делать', type: 'verb' }, { text: 'kazi', meaning: 'работа', type: 'noun' }], literal: 'Он/она-сейчас-делать работа' },
            'Hakuna matata': { parts: [{ text: 'Hakuna', meaning: 'нет', type: 'verb' }, { text: 'matata', meaning: 'проблемы', type: 'noun' }], literal: 'Нет проблем' }
        };

        // ================== ГЛОБАЛЬНЫЕ НАСТРОЙКИ ==================
        let currentLang = 'sw', uiLang = 'ru', currentTab = 'words', words = [], phrases = [];
        const flags = { sw: '🇹🇿', en: '🇬🇧', fr: '🇫🇷', de: '🇩🇪', es: '🇪🇸', it: '🇮🇹', pt: '🇵🇹', nl: '🇳🇱' };
        const langNamesFull = { sw: 'суахили', en: 'английский', fr: 'французский', de: 'немецкий', es: 'испанский' };
        const placeholders = {
            ru: 'Введи слово или фразу на русском...',
            en: 'Enter a word or phrase in English...',
            fr: 'Entrez un mot ou une phrase en français...',
            de: 'Gib ein Wort oder einen Satz auf Deutsch ein...',
            es: 'Introduce una palabra o frase en español...'
        };

        // ================== ХРАНЕНИЕ (раздельные базы для каждой пары языков) ==================
        function getStorageKey(base) {
            return `lingvo_${currentLang}_from_${uiLang}_${base}`;
        }
        function loadWords() {
            const stored = localStorage.getItem(getStorageKey('words'));
            if (stored) { try { return JSON.parse(stored); } catch(e) {} }
            return [];
        }
        function loadPhrases() {
            const stored = localStorage.getItem(getStorageKey('phrases'));
            if (stored) { try { return JSON.parse(stored); } catch(e) {} }
            return [];
        }
        function saveWords() { localStorage.setItem(getStorageKey('words'), JSON.stringify(words)); }
        function savePhrases() { localStorage.setItem(getStorageKey('phrases'), JSON.stringify(phrases)); }

        // Аварийный бэкап
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('lingvo_emergency_backup', JSON.stringify({ lang: currentLang, uiLang, words, phrases }));
        });
        function tryEmergencyRestore() {
            if (words.length === 0 && phrases.length === 0) {
                const emergency = localStorage.getItem('lingvo_emergency_backup');
                if (emergency) {
                    try {
                        const backup = JSON.parse(emergency);
                        if (backup.lang === currentLang && backup.uiLang === uiLang) {
                            words = backup.words || [];
                            phrases = backup.phrases || [];
                            saveWords(); savePhrases();
                        }
                    } catch(e) {}
                }
            }
        }

        // Аудио рекордер (ручной)
        let mediaRecorder, audioChunks = [], currentRecBtn = null, isRecording = false;
        async function toggleRecording(btn, word) {
            if(!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        new Audio(URL.createObjectURL(new Blob(audioChunks, { type: 'audio/mp3' }))).play();
                        stream.getTracks().forEach(t => t.stop());
                        btn.textContent = '🎤'; btn.style.background = '#8b4513'; isRecording = false; currentRecBtn = null;
                    };
                    mediaRecorder.start();
                    btn.textContent = '🔴'; btn.style.background = '#8b0000'; isRecording = true; currentRecBtn = btn;
                } catch(e) { alert('❌ Нет доступа к микрофону.'); }
            } else { if(mediaRecorder?.state === 'recording') mediaRecorder.stop(); }
        }

        // Интерфейс
        const app = document.getElementById('app'), searchInput = document.getElementById('search-input');
        const newItemInput = document.getElementById('new-item-input'), addItemBtn = document.getElementById('add-item-btn');
        const langSelect = document.getElementById('lang-select'), langFlag = document.getElementById('lang-flag');
        const uiLangSelect = document.getElementById('ui-lang-select');
        const settingsToggle = document.getElementById('settings-toggle'), settingsPanel = document.getElementById('settings-panel');
        const modal = document.getElementById('xray-modal'), xrayText = document.getElementById('xray-text');

        settingsToggle.addEventListener('click', () => settingsPanel.style.display = settingsPanel.style.display === 'none' ? 'block' : 'none');
        function updatePlaceholder() { newItemInput.placeholder = placeholders[uiLang] || placeholders.ru; }

        function switchLanguage(lang) {
            currentLang = lang; langFlag.textContent = flags[lang] || '🌐';
            words = loadWords(); phrases = loadPhrases(); tryEmergencyRestore(); renderCards();
        }
        langSelect.addEventListener('change', e => switchLanguage(e.target.value));

        uiLangSelect.addEventListener('change', e => {
            uiLang = e.target.value; updatePlaceholder();
            words = loadWords(); phrases = loadPhrases(); renderCards();
        });

        document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); currentTab = btn.dataset.tab; renderCards();
        }));

        function deleteItem(index) {
            if(currentTab === 'words') { words.splice(index, 1); saveWords(); }
            else { phrases.splice(index, 1); savePhrases(); }
            renderCards();
        }

        function isWordKnown(sw) { return words.some(w => w.sw === sw); }
        async function addPartToDictionary(part) {
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${uiLang}&dt=t&q=${encodeURIComponent(part.text)}`);
                const data = await res.json(); const translated = data[0][0][0] || part.meaning;
                words.push({ sw: part.text, ru: translated }); saveWords(); renderCards();
                alert(`✅ "${part.text}" добавлено как "${translated}"`);
            } catch(e) {
                words.push({ sw: part.text, ru: part.meaning }); saveWords(); renderCards();
                alert(`✅ "${part.text}" добавлено`);
            }
        }

        function showXRay(phraseText) {
            const question = encodeURIComponent(`Разбери фразу на ${langNamesFull[currentLang] || currentLang}: "${phraseText}". Дай таблицу с частями, значением и дословный перевод.`);
            const chatUrl = `https://chat.openai.com/?q=${question}`; // Или ваш URL
            
            const flag = flags[currentLang] || '🌐';
            
            xrayText.innerHTML = `
                <p><strong>${flag} ${phraseText}</strong></p>
                <p>Нажмите кнопку, чтобы скопировать фразу и открыть чат с Дипсиком для разбора.</p>
                <button id="copy-and-chat" style="background: #d4af37; color: #1e3b1a; padding: 12px 20px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer;">🤖 Спросить Дипсика</button>
            `;
            
            document.getElementById('copy-and-chat').addEventListener('click', () => {
                navigator.clipboard?.writeText(phraseText);
                window.open('https://chat.openai.com/', '_blank');
            });
            
            modal.style.display = 'flex';
        }

        function renderCards() {
            const term = searchInput.value.trim().toLowerCase();
            let items = currentTab === 'words' ? [...words] : [...phrases];
            if(term) items = items.filter(i => i.sw.toLowerCase().includes(term) || i.ru.toLowerCase().includes(term));
            app.innerHTML = items.length ? '' : `<div class="empty-message">✨ Пока нет ${currentTab === 'words' ? 'слов' : 'фраз'}</div>`;
            items.forEach((item) => {
                const originalIdx = (currentTab === 'words' ? words : phrases).findIndex(o => o.sw === item.sw && o.ru === item.ru);
                const card = document.createElement('div'); card.className = 'card';
                const del = document.createElement('button'); del.textContent = '✖'; del.className = 'delete-btn';
                del.onclick = (e) => { e.stopPropagation(); if(confirm(`Удалить "${item.ru}"?`)) deleteItem(originalIdx); };
                card.appendChild(del);
                const txt = document.createElement('div'); txt.className = 'card-text'; txt.textContent = item.ru; let flip = true;
                const ctrls = document.createElement('div'); ctrls.className = 'controls';
                const play = document.createElement('button'); play.textContent = '🔊';
                play.onclick = (e) => { e.stopPropagation(); const u = new SpeechSynthesisUtterance(item.sw); u.lang = currentLang; u.rate = 0.9; speechSynthesis.speak(u); };
                const tip = document.createElement('button'); tip.textContent = '🧠'; tip.style.background = '#4a6b45';
                tip.onclick = (e) => { e.stopPropagation(); showXRay(item.sw); };
                const rec = document.createElement('button'); rec.textContent = '🎤'; rec.style.background = '#8b4513';
                rec.onclick = (e) => { e.stopPropagation(); toggleRecording(rec, item.sw); };
                ctrls.appendChild(play); ctrls.appendChild(tip); ctrls.appendChild(rec);
                card.appendChild(txt); card.appendChild(ctrls);
                card.onclick = (e) => { if(e.target.tagName !== 'BUTTON') { flip = !flip; txt.textContent = flip ? item.ru : item.sw; } };
                app.appendChild(card);
            });
        }

        document.getElementById('close-modal').addEventListener('click', () => modal.style.display = 'none');
        window.addEventListener('click', e => { if(e.target === modal) modal.style.display = 'none'; });
        searchInput.addEventListener('input', renderCards);

        // Добавление
        async function addNewItem() {
            const ru = newItemInput.value.trim(); if(!ru) return;
            addItemBtn.disabled = true; addItemBtn.textContent = '⏳ Перевод...';
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${uiLang}&tl=${currentLang}&dt=t&q=${encodeURIComponent(ru)}`;
                const res = await fetch(url); const data = await res.json();
                let sw = data[0][0][0];
                const isPhrase = ru.includes(' ') ? (ru.split(/\s+/).length >= 3 || confirm(`"${ru}" → "${sw}"\n\nЭто ФРАЗА?`)) : false;
                if(isPhrase) { phrases.push({ sw, ru }); savePhrases(); }
                else { words.push({ sw, ru }); saveWords(); }
                newItemInput.value = ''; renderCards();
                if(isPhrase && currentTab !== 'phrases') document.querySelector('[data-tab="phrases"]').click();
                else if(!isPhrase && currentTab !== 'words') document.querySelector('[data-tab="words"]').click();
            } catch(e) { alert('❌ Ошибка сети.'); }
            finally { addItemBtn.disabled = false; addItemBtn.textContent = '➕ Добавить'; }
        }
        addItemBtn.addEventListener('click', addNewItem);
        newItemInput.addEventListener('keypress', e => { if(e.key === 'Enter') addNewItem(); });

        // Экспорт/Импорт
        document.getElementById('export-btn').addEventListener('click', async () => {
            const data = { lang: currentLang, uiLang, words, phrases };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const name = `lingvo_${currentLang}_from_${uiLang}_${new Date().toISOString().slice(0,10)}.json`;
            if(navigator.share && navigator.canShare) {
                const file = new File([blob], name, { type: 'application/json' });
                if(navigator.canShare({ files: [file] })) { try { await navigator.share({ files: [file] }); return; } catch(e) {} }
            }
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click();
        });
        document.getElementById('import-btn').addEventListener('click', () => document.getElementById('import-file-input').click());
        document.getElementById('import-file-input').addEventListener('change', e => {
            const f = e.target.files[0]; if(!f) return; const r = new FileReader();
            r.onload = ev => {
                try {
                    const imp = JSON.parse(ev.target.result);
                    if(imp.lang !== currentLang || imp.uiLang !== uiLang) {
                        if(!confirm(`⚠️ Файл для пары "${imp.uiLang}→${imp.lang}". Сейчас выбрано "${uiLang}→${currentLang}". Импортировать?`)) return;
                    }
                    if(imp.words) { words = imp.words; saveWords(); }
                    if(imp.phrases) { phrases = imp.phrases; savePhrases(); }
                    renderCards(); alert('✅ Импорт завершён!');
                } catch(err) { alert('❌ Ошибка файла.'); }
                e.target.value = '';
            };
            r.readAsText(f);
        });

        // ================== ТРЕНИРОВКА ==================
        const challengePrompt = document.getElementById('challenge-prompt');
        const challengeInput = document.getElementById('challenge-input');
        const startBtn = document.getElementById('start-challenge-btn');
        const playBtn = document.getElementById('play-challenge-btn');
        const recBtn = document.getElementById('record-challenge-btn');
        const checkBtn = document.getElementById('check-answer-btn');
        const resultDiv = document.getElementById('challenge-result');
        let currentItem = null;

        function pickRandom() {
            const items = currentTab === 'words' ? words : phrases;
            if(!items.length) { challengePrompt.textContent = '✨ Добавьте элементы'; return; }
            currentItem = items[Math.floor(Math.random() * items.length)];
            challengePrompt.textContent = `👉 ${currentItem.ru} 👈`;
            challengeInput.style.display = 'block'; challengeInput.value = '';
            playBtn.style.display = 'inline-block'; recBtn.style.display = 'inline-block';
            checkBtn.style.display = 'inline-block'; startBtn.textContent = '🔄 Следующий';
            resultDiv.textContent = '';
        }

        function checkAnswer() {
            if(!currentItem) return;
            const userAnswer = challengeInput.value.trim();
            const isCorrect = userAnswer.toLowerCase() === currentItem.sw.toLowerCase();
            resultDiv.innerHTML = isCorrect ? `✅ Верно! ${currentItem.sw}` : `❌ Неверно. Правильно: ${currentItem.sw}`;
            if(isCorrect) { const u = new SpeechSynthesisUtterance(currentItem.sw); u.lang = currentLang; speechSynthesis.speak(u); }
        }

        startBtn.addEventListener('click', pickRandom);
        playBtn.addEventListener('click', () => { if(currentItem) { const u = new SpeechSynthesisUtterance(currentItem.sw); u.lang = currentLang; speechSynthesis.speak(u); } });
        recBtn.addEventListener('click', () => { if(currentItem) toggleRecording(recBtn, currentItem.sw); });
        checkBtn.addEventListener('click', checkAnswer);
        challengeInput.addEventListener('keypress', e => { if(e.key === 'Enter') checkAnswer(); });

        const origRender = renderCards;
        renderCards = function() { origRender(); currentItem = null; challengePrompt.textContent = 'Нажми «Случайный элемент»'; challengeInput.style.display = 'none'; playBtn.style.display = 'none'; recBtn.style.display = 'none'; checkBtn.style.display = 'none'; startBtn.textContent = '🎲 Случайный'; resultDiv.textContent = ''; };

        // Старт
        switchLanguage('sw');
        updatePlaceholder();
    </script>
</body>
</html>
