<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Суахили · ЛингвоТренажёр 2.0</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body {
            background: linear-gradient(145deg, #1a2a1f 0%, #0f1a0e 100%);
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2, h3 {
            color: #e0d5c1;
            text-shadow: 2px 2px 0 #1e3b1a;
            margin-bottom: 16px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 8px;
            text-align: center;
        }
        
        /* Вкладки */
        .tabs-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #1e3b1a80;
            padding: 8px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            border: 1px solid #d4af37;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #b59a6b;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #d4af37;
            color: #1e3b1a;
            box-shadow: 0 4px 0 #7a5c1a;
        }
        
        /* Поиск */
        .search-panel {
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }
        .search-panel input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 40px;
            border: none;
            background: #fcf9f0;
            color: #1e3b1a;
            font-weight: bold;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }
        
        /* Панель добавления */
        .add-panel {
            background: #1e3b1a80;
            backdrop-filter: blur(4px);
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #d4af37;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-width: 600px;
        }
        .add-panel input {
            flex: 2 1 200px;
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 40px;
            border: none;
            background: #fcf9f0;
            color: #1e3b1a;
            font-weight: bold;
        }
        .add-panel button {
            flex: 0 0 auto;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            background: #d4af37;
            color: #1e3b1a;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #7a5c1a;
        }
        .add-panel button:disabled { opacity: 0.6; }
        
        /* Контейнер карточек */
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            max-width: 900px;
        }
        .card {
            background: #fcf9f0;
            border: 3px solid #d4af37;
            border-radius: 20px;
            padding: 16px 10px 10px 10px;
            width: 160px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 6px 0 #1e3b1a, 0 4px 10px rgba(0,0,0,0.4);
            transition: 0.1s ease;
            position: relative;
            touch-action: manipulation;
        }
        .card:active { transform: translateY(3px); box-shadow: 0 3px 0 #1e3b1a; }
        .card-text {
            font-size: 24px;
            font-weight: bold;
            color: #1e3b1a;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            word-break: break-word;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            border-top: 1px dashed #b59a6b;
            padding-top: 10px;
        }
        .controls button {
            background: #2e4a2a;
            border: none;
            color: white;
            font-size: 20px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 0 #142310;
            border: 1px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Бэкап-панель */
        .backup-panel {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .backup-btn {
            background: transparent;
            border: 1px solid #b59a6b;
            color: #b59a6b;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        #import-file-input { display: none; }
        .footer { margin-top: 20px; color: #b59a6b; text-align: center; }
    </style>
</head>
<body>
    <h2>📚 Суахили · Тренажёр 2.0</h2>
    
    <!-- Вкладки -->
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="words">📝 Слова</button>
        <button class="tab-btn" data-tab="phrases">💬 Фразы</button>
        <button class="tab-btn" data-tab="patterns">🧩 Конструкты</button>
    </div>
    
    <!-- Поиск -->
    <div class="search-panel">
        <input type="text" id="search-input" placeholder="🔍 Поиск...">
    </div>
    
    <!-- Панель добавления (меняется в зависимости от вкладки) -->
    <div class="add-panel" id="add-panel">
        <input type="text" id="new-item-input" placeholder="Введи слово на русском...">
        <button id="add-item-btn">➕ Добавить</button>
    </div>

    <!-- Контейнер для карточек -->
    <div id="app" class="cards-container"></div>
    
    <!-- Бэкап -->
    <div class="backup-panel">
        <button class="backup-btn" id="export-btn">📤 Экспорт</button>
        <button class="backup-btn" id="import-btn">📥 Импорт</button>
    </div>
    <input type="file" id="import-file-input" accept=".json">
    
    <div class="footer">🇹🇿 Активный recall · 🔊 слушай · 🧠 разбор</div>

    <script>
        // ================== ГЛОБАЛЬНЫЕ НАСТРОЙКИ ==================
        const STORAGE_WORDS = 'swahili_words_v2';
        const STORAGE_PHRASES = 'swahili_phrases_v2';
        
        // Стартовые наборы
        const DEFAULT_WORDS = [
            { sw: 'Jina', ru: 'Имя' },
            { sw: 'Nani', ru: 'Кто' },
            { sw: 'Wapi', ru: 'Где/Куда' },
            { sw: 'Mimi', ru: 'Я' },
            { sw: 'Wewe', ru: 'Ты' },
            { sw: 'Yeye', ru: 'Он/Она' },
            { sw: 'Ninatoka', ru: 'Я из ...' },
            { sw: 'Unasoma', ru: 'Ты учишься' },
            { sw: 'Anafanya kazi', ru: 'Он/Она работает' },
            { sw: 'Asante', ru: 'Спасибо' },
            { sw: 'Karibu', ru: 'Добро пожаловать' },
            { sw: 'Kwa heri', ru: 'До свидания' },
            { sw: 'Twende', ru: 'Поехали!' }
        ];
        
        const DEFAULT_PHRASES = [
            { sw: 'Jina langu ni ...', ru: 'Меня зовут ...' },
            { sw: 'Ninatoka Urusi', ru: 'Я из России' },
            { sw: 'Hakuna matata', ru: 'Нет проблем' }
        ];
        
        // Текущее состояние
        let currentTab = 'words';
        let words = loadFromStorage(STORAGE_WORDS, DEFAULT_WORDS);
        let phrases = loadFromStorage(STORAGE_PHRASES, DEFAULT_PHRASES);
        
        // ================== ХРАНЕНИЕ ==================
        function loadFromStorage(key, defaultData) {
            const stored = localStorage.getItem(key);
            if (stored) {
                try { return JSON.parse(stored); } catch(e) {}
            }
            return [...defaultData];
        }
        
        function saveToStorage(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }
        
        // ================== ИНТЕРФЕЙС ==================
        const app = document.getElementById('app');
        const searchInput = document.getElementById('search-input');
        const addPanel = document.getElementById('add-panel');
        const newItemInput = document.getElementById('new-item-input');
        const addItemBtn = document.getElementById('add-item-btn');
        
        // Вкладки
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                
                // Меняем плейсхолдер в поле ввода
                if (currentTab === 'words') {
                    newItemInput.placeholder = 'Введи слово на русском...';
                } else if (currentTab === 'phrases') {
                    newItemInput.placeholder = 'Введи фразу на русском...';
                } else {
                    newItemInput.placeholder = 'Конструкты — в разработке 🧩';
                }
                
                renderCards();
            });
        });
        
        // Рендер карточек с учётом поиска
        function renderCards() {
            const searchTerm = searchInput.value.trim().toLowerCase();
            let items = currentTab === 'words' ? words : phrases;
            
            // Фильтрация
            if (searchTerm) {
                items = items.filter(item => 
                    item.sw.toLowerCase().includes(searchTerm) || 
                    item.ru.toLowerCase().includes(searchTerm)
                );
            }
            
            app.innerHTML = '';
            
            if (currentTab === 'patterns') {
                app.innerHTML = '<div style="color:#e0d5c1; padding:40px; text-align:center;">🧩 Конструкты скоро появятся!<br>Здесь будет генератор фраз по шаблонам.</div>';
                return;
            }
            
            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const textDiv = document.createElement('div');
                textDiv.className = 'card-text';
                textDiv.textContent = item.ru;
                let flipped = true;
                
                const controls = document.createElement('div');
                controls.className = 'controls';
                
                // 🔊 Озвучка
                const playBtn = document.createElement('button');
                playBtn.textContent = '🔊';
                playBtn.onclick = (e) => {
                    e.stopPropagation();
                    const utterance = new SpeechSynthesisUtterance(item.sw);
                    utterance.lang = 'sw-KE';
                    utterance.rate = 0.9;
                    speechSynthesis.speak(utterance);
                };
                
                // 🧠 Справка (заглушка)
                const tipBtn = document.createElement('button');
                tipBtn.textContent = '🧠';
                tipBtn.style.background = '#4a6b45';
                tipBtn.onclick = (e) => {
                    e.stopPropagation();
                    alert(`🧠 Справка по "${item.sw}":\n\n(Разбор будет добавлен в следующей версии)`);
                };
                
                controls.appendChild(playBtn);
                controls.appendChild(tipBtn);
                
                card.appendChild(textDiv);
                card.appendChild(controls);
                
                card.onclick = () => {
                    flipped = !flipped;
                    textDiv.textContent = flipped ? item.ru : item.sw;
                };
                
                app.appendChild(card);
            });
        }
        
        // Поиск (живой фильтр)
        searchInput.addEventListener('input', renderCards);
        
        // ================== ДОБАВЛЕНИЕ ==================
        async function addNewItem() {
            const ruText = newItemInput.value.trim();
            if (!ruText) return;
            
            addItemBtn.disabled = true;
            addItemBtn.textContent = '⏳ Перевод...';
            
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ru&tl=sw&dt=t&q=${encodeURIComponent(ruText)}`;
                const res = await fetch(url);
                const data = await res.json();
                const swText = data[0][0][0];
                
                if (swText) {
                    const newItem = { sw: swText, ru: ruText };
                    
                    if (currentTab === 'words') {
                        words.push(newItem);
                        saveToStorage(STORAGE_WORDS, words);
                    } else if (currentTab === 'phrases') {
                        phrases.push(newItem);
                        saveToStorage(STORAGE_PHRASES, phrases);
                    }
                    
                    newItemInput.value = '';
                    renderCards();
                } else {
                    alert('❌ Не удалось перевести.');
                }
            } catch (e) {
                alert('❌ Ошибка сети.');
            } finally {
                addItemBtn.disabled = false;
                addItemBtn.textContent = '➕ Добавить';
            }
        }
        
        addItemBtn.addEventListener('click', addNewItem);
        newItemInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addNewItem();
        });
        
        // ================== ЭКСПОРТ / ИМПОРТ ==================
        document.getElementById('export-btn').addEventListener('click', () => {
            const data = { words, phrases };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `swahili_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        });
        
        document.getElementById('import-btn').addEventListener('click', () => {
            document.getElementById('import-file-input').click();
        });
        
        document.getElementById('import-file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (imported.words) {
                        words = imported.words;
                        saveToStorage(STORAGE_WORDS, words);
                    }
                    if (imported.phrases) {
                        phrases = imported.phrases;
                        saveToStorage(STORAGE_PHRASES, phrases);
                    }
                    renderCards();
                    alert('✅ Импорт завершён!');
                } catch (err) {
                    alert('❌ Ошибка чтения файла.');
                }
                e.target.value = '';
            };
            reader.readAsText(file);
        });
        
        // Старт
        renderCards();
    </script>
</body>
</html>
