<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Суахили Тренажёр · Урок 1</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1a2a1f 0%, #0f1a0e 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            color: #e0d5c1;
            text-shadow: 2px 2px 0 #1e3b1a;
            font-size: 2.2rem;
            margin-bottom: 30px;
            border-bottom: 3px solid #d4af37;
            padding-bottom: 10px;
        }
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1000px;
        }
        .card {
            background: #fcf9f0;
            border: 4px solid #d4af37;
            border-radius: 20px;
            padding: 25px 15px 15px 15px;
            width: 180px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 10px 0 #1e3b1a, 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
        }
        .card:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #1e3b1a, 0 5px 10px rgba(0,0,0,0.5);
        }
        .card-text {
            font-size: 28px;
            font-weight: bold;
            color: #1e3b1a;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            word-break: break-word;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 1px dashed #b59a6b;
            padding-top: 15px;
        }
        .controls button {
            background: #2e4a2a;
            border: none;
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 0 #142310;
            transition: 0.05s linear;
            border: 1px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .controls button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #142310;
        }
        .footer {
            margin-top: 40px;
            color: #b59a6b;
        }
    </style>
</head>
<body>
    <h2>📚 Somo la Kwanza</h2>
    <div id="app" class="cards-container"></div>
    <div class="footer">🔊 слушай · 🔄 переверни · 🎤 запиши и слушай себя</div>

    <script>
        // ================== АУДИО РЕКОРДЕР ==================
        let mediaRecorder;
        let audioChunks = [];
        let currentRecBtn = null;

        async function startRecording(word) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play();

                    stream.getTracks().forEach(track => track.stop());

                    if (currentRecBtn) {
                        currentRecBtn.textContent = '🎤';
                        currentRecBtn.style.background = '#2e4a2a';
                        currentRecBtn = null;
                    }
                };

                mediaRecorder.start();

                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, 3000);

            } catch (err) {
                alert('❌ Нет доступа к микрофону. Разрешите запись в браузере.');
                if (currentRecBtn) {
                    currentRecBtn.textContent = '🎤';
                    currentRecBtn.style.background = '#2e4a2a';
                    currentRecBtn = null;
                }
            }
        }
        // =====================================================

        document.addEventListener('DOMContentLoaded', function() {
            const words = [
                { sw: 'Jina', ru: 'Имя' },
                { sw: 'Nani', ru: 'Кто' },
                { sw: 'Wapi', ru: 'Где/Куда' },
                { sw: 'Mimi', ru: 'Я' },
                { sw: 'Wewe', ru: 'Ты' },
                { sw: 'Yeye', ru: 'Он/Она' },
                { sw: 'Ninatoka', ru: 'Я из ... (происхожу)' },
                { sw: 'Unasoma', ru: 'Ты учишься' },
                { sw: 'Anafanya kazi', ru: 'Он/Она работает' },
                { sw: 'Asante', ru: 'Спасибо' },
                { sw: 'Karibu', ru: 'Добро пожаловать / Пожалуйста' },
                { sw: 'Kwa heri', ru: 'До свидания' },
                { sw: 'Twende', ru: 'Поехали!' }
            ];

            const app = document.getElementById('app');
            if (!app) return;

            app.innerHTML = '';

            words.forEach(w => {
                const card = document.createElement('div');
                card.className = 'card';

                const textDiv = document.createElement('div');
                textDiv.className = 'card-text';
                textDiv.textContent = w.sw;

                let isFlipped = false;

                const controls = document.createElement('div');
                controls.className = 'controls';

                // 🔊 Кнопка Play (оригинал)
                const playBtn = document.createElement('button');
                playBtn.textContent = '🔊';
                playBtn.title = 'Прослушать произношение';
                playBtn.onclick = (e) => {
                    e.stopPropagation();
                    const audio = new Audio(`audio/${encodeURIComponent(w.sw)}.mp3`);
                    audio.play().catch(() => {
                        alert(`❌ Файл audio/${w.sw}.mp3 не найден`);
                    });
                };

                // 🎤 Кнопка Record (запись себя)
                const recBtn = document.createElement('button');
                recBtn.textContent = '🎤';
                recBtn.title = 'Записать свой голос (3 сек)';
                recBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (currentRecBtn) {
                        // Если уже идет запись с другой карточки — отменяем
                        return;
                    }
                    currentRecBtn = recBtn;
                    recBtn.textContent = '🔴';
                    recBtn.style.background = '#8b0000';
                    startRecording(w.sw);
                };

                controls.appendChild(playBtn);
                controls.appendChild(recBtn);
                card.appendChild(textDiv);
                card.appendChild(controls);

                // Переворот карточки
                card.onclick = () => {
                    isFlipped = !isFlipped;
                    textDiv.textContent = isFlipped ? w.ru : w.sw;
                };

                app.appendChild(card);
            });
        });
    </script>
</body>
</html>
