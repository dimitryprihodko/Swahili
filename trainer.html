<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Суахили · Активный тренажёр</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body {
            background: linear-gradient(145deg, #1a2a1f 0%, #0f1a0e 100%);
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2, h3 {
            color: #e0d5c1;
            text-shadow: 2px 2px 0 #1e3b1a;
            margin-bottom: 16px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 8px;
            text-align: center;
        }
        .add-word-panel {
            background: #1e3b1a80;
            backdrop-filter: blur(4px);
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #d4af37;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-width: 600px;
        }
        .add-word-panel input {
            flex: 2 1 200px;
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 40px;
            border: none;
            background: #fcf9f0;
            color: #1e3b1a;
            font-weight: bold;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }
        .add-word-panel button {
            flex: 0 0 auto;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            background: #d4af37;
            color: #1e3b1a;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #7a5c1a;
            transition: 0.05s linear;
            border: 1px solid #ffe28c;
        }
        .add-word-panel button:active { transform: translateY(4px); box-shadow: 0 1px 0 #7a5c1a; }
        .add-word-panel button:disabled { opacity: 0.6; transform: none; box-shadow: 0 4px 0 #7a5c1a; }
        
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            max-width: 900px;
        }
        .card {
            background: #fcf9f0;
            border: 3px solid #d4af37;
            border-radius: 20px;
            padding: 16px 10px 10px 10px;
            width: 160px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 6px 0 #1e3b1a, 0 4px 10px rgba(0,0,0,0.4);
            transition: 0.1s ease;
            position: relative;
            touch-action: manipulation;
        }
        .card:active { transform: translateY(3px); box-shadow: 0 3px 0 #1e3b1a, 0 2px 6px rgba(0,0,0,0.4); }
        .card-text {
            font-size: 24px;
            font-weight: bold;
            color: #1e3b1a;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            word-break: break-word;
        }
        .controls { display: flex; justify-content: center; gap: 10px; border-top: 1px dashed #b59a6b; padding-top: 10px; }
        .controls button {
            background: #2e4a2a;
            border: none;
            color: white;
            font-size: 22px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 0 #142310;
            border: 1px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .controls button:active { transform: translateY(3px); box-shadow: 0 1px 0 #142310; }
        
        #active-challenge {
            margin-top: 30px;
            background: #1e3b1a80;
            padding: 20px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 2px solid #d4af37;
            text-align: center;
            width: 100%;
            max-width: 600px;
        }
        #challenge-word-ru {
            font-size: 32px;
            font-weight: bold;
            color: #fcf9f0;
            margin: 15px 0;
            text-shadow: 3px 3px 0 #0a1a08;
        }
        .challenge-btn {
            background: #d4af37;
            border: none;
            color: #1e3b1a;
            font-weight: bold;
            padding: 14px 24px;
            font-size: 20px;
            border-radius: 50px;
            margin: 6px;
            cursor: pointer;
            box-shadow: 0 5px 0 #7a5c1a;
            transition: 0.05s linear;
            border: 1px solid #ffe28c;
            touch-action: manipulation;
        }
        .challenge-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #7a5c1a; }
        .challenge-btn:disabled { opacity: 0.5; transform: none; box-shadow: 0 5px 0 #7a5c1a; }
        #recognition-result { margin-top: 16px; font-size: 20px; color: #ffe28c; min-height: 36px; }
        .footer { margin-top: 30px; color: #b59a6b; text-align: center; }
        .delete-btn {
            position: absolute; top: 5px; right: 5px; background: transparent; border: none;
            color: #a00; font-size: 20px; cursor: pointer; opacity: 0.6; z-index: 5;
        }
        .delete-btn:active { opacity: 1; }
    </style>
</head>
<body>
    <h2>📚 Суахили · Активный тренажёр</h2>
    
    <div class="add-word-panel">
        <input type="text" id="new-word-input" placeholder="Введи фразу на русском..." value="Я хочу пить">
        <button id="add-word-btn">➕ Добавить</button>
    </div>

    <div id="app" class="cards-container"></div>
    
    <div id="active-challenge">
        <h3>🗣️ Произнеси вслух</h3>
        <div id="challenge-word-ru">Нажми «Случайное слово»</div>
        <div>
            <button class="challenge-btn" id="start-challenge-btn">🎲 Случайное</button>
            <button class="challenge-btn" id="speak-answer-btn" style="display: none;">🎤 Ответить</button>
        </div>
        <div id="recognition-result"></div>
    </div>
    
    <div class="footer">🇹🇿 русский → суахили · 🔊 слушай · 🔄 проверь · 🎤 запиши себя</div>

    <script>
        // ================== INDEXEDDB (ХРАНЕНИЕ АУДИО) ==================
        const DB_NAME = 'SwahiliAudioDB';
        const STORE_NAME = 'audio';
        let db = null;

        async function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (evt) => {
                    const db = evt.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
            });
        }

        async function saveAudioToDB(word, blob) {
            if (!db) await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.put(blob, word);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function getAudioFromDB(word) {
            if (!db) await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get(word);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // ================== АУДИО РЕКОРДЕР ==================
        let mediaRecorder;
        let audioChunks = [];
        let currentRecBtn = null;

        async function startRecording(word) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                    new Audio(URL.createObjectURL(blob)).play();
                    stream.getTracks().forEach(t => t.stop());
                    if (currentRecBtn) {
                        currentRecBtn.textContent = '🎤';
                        currentRecBtn.style.background = '#2e4a2a';
                        currentRecBtn = null;
                    }
                };
                mediaRecorder.start();
                setTimeout(() => { if (mediaRecorder?.state === 'recording') mediaRecorder.stop(); }, 3000);
            } catch (err) {
                alert('❌ Нет доступа к микрофону');
                if (currentRecBtn) { currentRecBtn.textContent = '🎤'; currentRecBtn.style.background = '#2e4a2a'; currentRecBtn = null; }
            }
        }
        
        // ================== GOOGLE SPEECH RECOGNITION ==================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) {
            recognition.lang = 'sw-KE';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
        }
        let currentChallengeWord = null;

        // ================== ДАННЫЕ ==================
        let words = [
            { sw: 'Jina', ru: 'Имя' },
            { sw: 'Nani', ru: 'Кто' },
            { sw: 'Wapi', ru: 'Где/Куда' },
            { sw: 'Mimi', ru: 'Я' },
            { sw: 'Wewe', ru: 'Ты' },
            { sw: 'Yeye', ru: 'Он/Она' },
            { sw: 'Ninatoka', ru: 'Я из ...' },
            { sw: 'Unasoma', ru: 'Ты учишься' },
            { sw: 'Anafanya kazi', ru: 'Он/Она работает' },
            { sw: 'Asante', ru: 'Спасибо' },
            { sw: 'Karibu', ru: 'Добро пожаловать' },
            { sw: 'Kwa heri', ru: 'До свидания' },
            { sw: 'Twende', ru: 'Поехали!' }
        ];

        const app = document.getElementById('app');

        function renderCards() {
            if (!app) return;
            app.innerHTML = '';
            words.forEach((w, index) => {
                const card = document.createElement('div'); card.className = 'card';
                const textDiv = document.createElement('div'); textDiv.className = 'card-text';
                textDiv.textContent = w.ru;   // ПО УМОЛЧАНИЮ РУССКИЙ (АКТИВНЫЙ RECALL)
                let flipped = true;
                
                const controls = document.createElement('div'); controls.className = 'controls';
                
                if (index >= 13) {
                    const delBtn = document.createElement('button');
                    delBtn.textContent = '✖'; delBtn.className = 'delete-btn';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        words.splice(index, 1);
                        renderCards();
                    };
                    card.appendChild(delBtn);
                }
                
                const playBtn = document.createElement('button'); playBtn.textContent = '🔊';
                playBtn.onclick = async (e) => { 
                    e.stopPropagation();
                    try {
                        const blob = await getAudioFromDB(w.sw);
                        if (blob) {
                            new Audio(URL.createObjectURL(blob)).play();
                        } else {
                            alert(`⚠️ Нет аудио для "${w.sw}"`);
                        }
                    } catch (err) {
                        alert(`⚠️ Ошибка загрузки аудио`);
                    }
                };
                
                const recBtn = document.createElement('button'); recBtn.textContent = '🎤';
                recBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (currentRecBtn) return;
                    currentRecBtn = recBtn; recBtn.textContent = '🔴'; recBtn.style.background = '#8b0000';
                    startRecording(w.sw);
                };
                
                controls.appendChild(playBtn); controls.appendChild(recBtn);
                card.appendChild(textDiv); card.appendChild(controls);
                card.onclick = () => { flipped = !flipped; textDiv.textContent = flipped ? w.ru : w.sw; };
                app.appendChild(card);
            });
        }

        // ================== ДОБАВЛЕНИЕ СЛОВА ==================
        const inputField = document.getElementById('new-word-input');
        const addBtn = document.getElementById('add-word-btn');
        
        async function translateAndAdd() {
            const ruText = inputField.value.trim();
            if (!ruText) return;
            
            addBtn.disabled = true;
            addBtn.textContent = '⏳ Перевожу...';
            
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ru&tl=sw&dt=t&q=${encodeURIComponent(ruText)}`;
                const response = await fetch(url);
                const data = await response.json();
                const swText = data[0][0][0];
                
                if (swText) {
                    words.push({ sw: swText, ru: ruText });
                    renderCards();
                    inputField.value = '';
                    
                    // Скачиваем и сохраняем аудио в IndexedDB
                    const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=sw&q=${encodeURIComponent(swText)}`;
                    const audioRes = await fetch(ttsUrl);
                    const audioBlob = await audioRes.blob();
                    await saveAudioToDB(swText, audioBlob);
                    console.log(`✅ Аудио сохранено в базу: ${swText}`);
                } else {
                    alert('❌ Не удалось перевести.');
                }
            } catch (e) {
                alert('❌ Ошибка сети.');
            } finally {
                addBtn.disabled = false;
                addBtn.textContent = '➕ Добавить';
            }
        }
        
        addBtn.addEventListener('click', translateAndAdd);
        inputField.addEventListener('keypress', (e) => { if(e.key === 'Enter') translateAndAdd(); });

        // ================== ТРЕНИРОВКА ==================
        const startBtn = document.getElementById('start-challenge-btn');
        const speakBtn = document.getElementById('speak-answer-btn');
        const challengeWordRuDiv = document.getElementById('challenge-word-ru');
        const resultDiv = document.getElementById('recognition-result');

        function pickRandomChallenge() {
            if (words.length === 0) return;
            const randomIndex = Math.floor(Math.random() * words.length);
            currentChallengeWord = words[randomIndex];
            challengeWordRuDiv.textContent = `👉 ${currentChallengeWord.ru} 👈`;
            speakBtn.style.display = 'inline-block';
            startBtn.textContent = '🔄 Другое слово';
            resultDiv.textContent = '';
        }

        function startListening() {
            if (!recognition) { alert('❌ Браузер не поддерживает распознавание речи'); return; }
            if (!currentChallengeWord) return;
            
            recognition.start();
            speakBtn.textContent = '🔴 Говорите...';
            speakBtn.disabled = true;
            resultDiv.textContent = '🎙️ Слушаю...';

            recognition.onresult = (event) => {
                const spoken = event.results[0][0].transcript.trim().toLowerCase();
                const correct = currentChallengeWord.sw.toLowerCase();
                if (spoken.includes(correct) || correct.includes(spoken)) {
                    resultDiv.innerHTML = `✅ Отлично! Вы сказали: "${spoken}"`;
                } else {
                    resultDiv.innerHTML = `❌ Ожидалось "${currentChallengeWord.sw}", а услышано: "${spoken}"`;
                }
                speakBtn.textContent = '🎤 Ответить';
                speakBtn.disabled = false;
            };
            
            recognition.onerror = (e) => {
                resultDiv.textContent = `❌ Ошибка: ${e.error}`;
                speakBtn.textContent = '🎤 Ответить';
                speakBtn.disabled = false;
            };
            
            recognition.onend = () => {
                if (speakBtn.disabled) { speakBtn.textContent = '🎤 Ответить'; speakBtn.disabled = false; }
            };
        }

        startBtn.addEventListener('click', pickRandomChallenge);
        speakBtn.addEventListener('click', startListening);
        
        openDB().then(() => renderCards());
    </script>
</body>
</html>
